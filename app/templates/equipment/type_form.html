{% extends "base.html" %}
{% block title %}{{ 'Upravit typ vybavení' if edit else 'Nový typ vybavení' }} — MedCover{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-lg-6">
    <h2 class="mb-4">{{ 'Upravit typ vybavení' if edit else 'Nový typ vybavení' }}</h2>
    <form method="POST" novalidate>
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      {% if edit %}
        <input type="hidden" name="version" value="{{ et.version }}">
      {% endif %}

      <div class="mb-3">
        <label for="name" class="form-label">Název <span class="text-danger">*</span></label>
        <input type="text" class="form-control" id="name" name="name"
               value="{{ et.name if edit else request.form.get('name', '') }}"
               required autofocus>
      </div>

      <div class="mb-3">
        <label for="category" class="form-label">Kategorie <span class="text-danger">*</span></label>
        <select class="form-select" id="category" name="category" required>
          <option value="">— vyberte —</option>
          <option value="personal"
            {{ 'selected' if (edit and et.category.value == 'personal') or (not edit and request.form.get('category') == 'personal') }}>
            Osobní
          </option>
          <option value="shared"
            {{ 'selected' if (edit and et.category.value == 'shared') or (not edit and request.form.get('category') == 'shared') }}>
            Sdílené
          </option>
        </select>
      </div>

      <div class="mb-4">
        <label for="description" class="form-label">Popis</label>
        <textarea class="form-control" id="description" name="description" rows="3">{{ (et.description or '') if edit else request.form.get('description', '') }}</textarea>
      </div>

      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-danger">{{ 'Uložit' if edit else 'Vytvořit' }}</button>
        <a href="{{ url_for('equipment.index') }}" class="btn btn-outline-secondary">Zrušit</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
