{% extends "base.html" %}
{% from 'macros/help.html' import help_icon %}
{% block title %}Nová nadřazená akce — MedCover{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-lg-7">
    <h2 class="mb-4">Nová nadřazená akce</h2>
    <form method="POST" novalidate>
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="mb-3">
        <label for="name" class="form-label">Název <span class="text-danger">*</span>
          {{ help_icon("Celý název nadřazené akce, např. 'Závod Rejvíz 2026'. Zobrazuje se v přehledech a při výběru pro konkrétní akce.") }}
        </label>
        <input type="text" class="form-control" id="name" name="name"
               value="{{ request.form.get('name', '') }}" required autofocus>
      </div>
      <div class="mb-3">
        <label for="description" class="form-label">Popis
          {{ help_icon("Volitelný popis nadřazené akce — kontext, informace pro koordinátory, specifika celé série.") }}
        </label>
        <textarea class="form-control" id="description" name="description" rows="3">{{ request.form.get('description', '') }}</textarea>
      </div>
      <div class="mb-4">
        <label for="coordinator_id" class="form-label">Koordinátor
          {{ help_icon("Koordinátor zodpovídá za celou nadřazenou akci a všechny akce pod ní. Má přístup k úpravám, může otevírat přihlášky a spravovat obsazení. Pokud není přiřazen, akci spravují pouze administrátoři.") }}
        </label>
        <select class="form-select" id="coordinator_id" name="coordinator_id">
          <option value="">— Nepřiřazen —</option>
          {% for user in coordinators %}
            <option value="{{ user.id }}"
              {{ 'selected' if request.form.get('coordinator_id') == user.id|string }}>
              {{ user.name }}
            </option>
          {% endfor %}
        </select>
      </div>
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-danger">Vytvořit</button>
        <a href="{{ url_for('master_events.index') }}" class="btn btn-outline-secondary">Zrušit</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
