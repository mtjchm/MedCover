{% extends "base.html" %}
{% block title %}Upravit: {{ me.name }} — MedCover{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-lg-7">
    <h2 class="mb-4">Upravit nadřazenou akci</h2>
    <form method="POST" novalidate>
      <input type="hidden" name="version" value="{{ me.version }}">
      <div class="mb-3">
        <label for="name" class="form-label">Název <span class="text-danger">*</span></label>
        <input type="text" class="form-control" id="name" name="name"
               value="{{ request.form.get('name', me.name) }}" required autofocus
               {% if me.is_general %}readonly{% endif %}>
        {% if me.is_general %}
          <div class="form-text text-muted">Název výchozí nadřazené akce nelze změnit.</div>
        {% endif %}
      </div>
      <div class="mb-3">
        <label for="description" class="form-label">Popis</label>
        <textarea class="form-control" id="description" name="description" rows="3">{{ request.form.get('description', me.description or '') }}</textarea>
      </div>
      <div class="mb-4">
        <label for="coordinator_id" class="form-label">Koordinátor</label>
        <select class="form-select" id="coordinator_id" name="coordinator_id">
          <option value="">— Nepřiřazen —</option>
          {% for user in coordinators %}
            <option value="{{ user.id }}"
              {{ 'selected' if (request.form.get('coordinator_id', me.coordinator_id|string)) == user.id|string }}>
              {{ user.name }}
            </option>
          {% endfor %}
        </select>
      </div>
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-danger">Uložit změny</button>
        <a href="{{ url_for('master_events.detail', me_id=me.id) }}" class="btn btn-outline-secondary">Zrušit</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
