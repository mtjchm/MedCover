{% extends "base.html" %}
{% block title %}Nové heslo — MedCover{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-sm-8 col-md-5 col-lg-4">
    <div class="card shadow-sm mt-4">
      <div class="card-body p-4">
        <h4 class="card-title mb-4 text-center">Nastavení nového hesla</h4>
        <form method="POST" novalidate>
          <div class="mb-3">
            <label for="password" class="form-label">Nové heslo</label>
            <input type="password" class="form-control" id="password" name="password" autofocus required minlength="8">
          </div>
          <div class="mb-3">
            <label for="password2" class="form-label">Zopakujte heslo</label>
            <input type="password" class="form-control" id="password2" name="password2" required minlength="8">
          </div>
          <div class="d-grid mt-4">
            <button type="submit" class="btn btn-danger">Uložit heslo</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
