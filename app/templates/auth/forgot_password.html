{% extends "base.html" %}
{% block title %}Zapomenuté heslo — MedCover{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-sm-8 col-md-5 col-lg-4">
    <div class="card shadow-sm mt-4">
      <div class="card-body p-4">
        <h4 class="card-title mb-1 text-center">Obnovení hesla</h4>
        <p class="text-muted small text-center mb-4">Zadejte svůj e-mail a my vám pošleme odkaz pro obnovení hesla.</p>
        <form method="POST" novalidate>
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <div class="mb-3">
            <label for="email" class="form-label">E-mail</label>
            <input type="email" class="form-control" id="email" name="email" autofocus required>
          </div>
          <div class="d-grid mt-4">
            <button type="submit" class="btn btn-danger">Odeslat odkaz</button>
          </div>
        </form>
        <hr>
        <div class="text-center small">
          <a href="{{ url_for('auth.login') }}">Zpět na přihlášení</a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
