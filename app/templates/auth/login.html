{% extends "base.html" %}

{% block title %}Přihlášení — MedCover{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-sm-8 col-md-5 col-lg-4">
    <div class="card shadow-sm mt-4">
      <div class="card-body p-4">
        <h4 class="card-title mb-4 text-center">Přihlášení</h4>
        <form method="POST" action="{{ url_for('auth.login') }}" novalidate>
          <div class="mb-3">
            <label for="email" class="form-label">E-mail</label>
            <input type="email" class="form-control" id="email" name="email"
                   autocomplete="email" autofocus required>
          </div>
          <div class="mb-3">
            <label for="password" class="form-label">Heslo</label>
            <input type="password" class="form-control" id="password" name="password"
                   autocomplete="current-password" required>
          </div>
          <div class="d-grid mt-4">
            <button type="submit" class="btn btn-danger">Přihlásit se</button>
          </div>
        </form>
        <hr>
        <div class="text-center small">
          <a href="{{ url_for('auth.forgot_password') }}">Zapomněli jste heslo?</a>
        </div>
      </div>
    </div>

    {% if config.DEV_LOGIN_ENABLED %}
    <div class="card border-warning mt-3">
      <div class="card-header bg-warning text-dark fw-bold">
        🛠️ Developer Quick Login
      </div>
      <div class="card-body p-3">
        <p class="small text-muted mb-2">
          Only visible in dev environment. Run <code>scripts/seed_dev.py</code> first.
        </p>
        <div class="d-grid gap-2">
          <form method="POST" action="{{ url_for('dev.login_as', role='admin') }}">
            <button class="btn btn-outline-dark btn-sm w-100 text-start">
              <strong>Admin</strong> — full system access
            </button>
          </form>
          <form method="POST" action="{{ url_for('dev.login_as', role='coordinator') }}">
            <button class="btn btn-outline-primary btn-sm w-100 text-start">
              <strong>Coordinator</strong> — manage master events &amp; events
            </button>
          </form>
          <form method="POST" action="{{ url_for('dev.login_as', role='member') }}">
            <button class="btn btn-outline-success btn-sm w-100 text-start">
              <strong>Member</strong> — join events, submit debriefings
            </button>
          </form>
          <form method="POST" action="{{ url_for('dev.login_as', role='viewer') }}">
            <button class="btn btn-outline-secondary btn-sm w-100 text-start">
              <strong>Viewer</strong> — read-only access
            </button>
          </form>
          <form method="POST" action="{{ url_for('dev.login_as', role='inactive') }}">
            <button class="btn btn-outline-warning btn-sm w-100 text-start">
              <strong>Inactive</strong> — pending activation
            </button>
          </form>
        </div>
      </div>
    </div>
    {% endif %}

  </div>
</div>
{% endblock %}
