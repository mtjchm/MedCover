{% extends "base.html" %}
{% from 'macros/help.html' import help_icon %}
{% block title %}Nová akce — MedCover{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-lg-8">
    <h2 class="mb-4">Nová akce</h2>
    <form method="POST" novalidate>
      <div class="row g-3">
        <div class="col-12">
          <label for="name" class="form-label">Název <span class="text-danger">*</span>
            {{ help_icon("Celý název akce, jak se zobrazí v přehledech a v kalendáři.") }}
          </label>
          <input type="text" class="form-control" id="name" name="name"
                 value="{{ request.form.get('name', '') }}" required autofocus>
        </div>
        <div class="col-12 col-md-6">
          <label for="master_event_id" class="form-label">Nadřazená akce <span class="text-danger">*</span>
            {{ help_icon("Nadřazená akce sdružuje více akcí do celku pro souhrnné výkazy a přehlednou organizaci. Pokud akce nepatří do žádné série, vyberte 'Obecné'.") }}
          </label>
          <select class="form-select" id="master_event_id" name="master_event_id" required>
            <option value="">— Vyberte —</option>
            {% for me in master_events %}
              <option value="{{ me.id }}"
                {{ 'selected' if request.form.get('master_event_id') == me.id|string }}>
                {{ me.name }}{% if me.is_general %} (Výchozí){% endif %}
              </option>
            {% endfor %}
          </select>
        </div>
        <div class="col-12 col-md-6">
          <label for="responsible_person_id" class="form-label">Zodpovědná osoba (RP)
            {{ help_icon("Zodpovědná osoba je vedoucí zdravotník na místě. Zobrazuje se v přehledech a v dokumentaci akce. Neovlivňuje přístupová práva — ta jsou řízena rolemi.") }}
          </label>
          <select class="form-select" id="responsible_person_id" name="responsible_person_id">
            <option value="">— Nepřiřazena —</option>
            {% for user in users %}
              <option value="{{ user.id }}"
                {{ 'selected' if request.form.get('responsible_person_id') == user.id|string }}>
                {{ user.name }}
              </option>
            {% endfor %}
          </select>
        </div>
        <div class="col-12 col-md-6">
          <label for="start_datetime" class="form-label">Začátek <span class="text-danger">*</span>
            {{ help_icon("Datum a čas zahájení akce. Slouží pro řazení v přehledech a kalendáři.") }}
          </label>
          <input type="text" class="form-control flatpickr-dt" id="start_datetime" name="start_datetime"
                 value="{{ request.form.get('start_datetime', '') }}" required>
        </div>
        <div class="col-12 col-md-6">
          <label for="end_datetime" class="form-label">Konec <span class="text-danger">*</span>
            {{ help_icon("Datum a čas ukončení akce. Po tomto čase scheduler automaticky přesune akci do stavu Dokončena.") }}
          </label>
          <input type="text" class="form-control flatpickr-dt" id="end_datetime" name="end_datetime"
                 value="{{ request.form.get('end_datetime', '') }}" required>
        </div>
        <div class="col-12 col-md-6">
          <label for="assignments_open_datetime" class="form-label">Otevření přihlášek
            {{ help_icon("Pokud zadáte datum, přihlašování se automaticky otevře až v tento čas. Prázdné = přihlašování se otevře ihned po zveřejnění akce.") }}
          </label>
          <input type="text" class="form-control flatpickr-dt" id="assignments_open_datetime" name="assignments_open_datetime"
                 value="{{ request.form.get('assignments_open_datetime', '') }}">
          <div class="form-text">Prázdné = okamžitě po zveřejnění</div>
        </div>
        <div class="col-12 col-md-3">
          <label for="spot_count" class="form-label">Počet míst
            {{ help_icon("Počet zdravotnických míst na akci. Každé místo může mít přiřazenu požadovanou kvalifikaci. Po vytvoření akce lze místa přidávat nebo odebírat.") }}
          </label>
          <input type="number" class="form-control" id="spot_count" name="spot_count"
                 value="{{ request.form.get('spot_count', '1') }}" min="0" max="50">
        </div>
        <div class="col-12 col-md-3 d-flex align-items-end">
          <div class="form-check mb-2">
            <input class="form-check-input" type="checkbox" id="paid" name="paid" value="1"
                   {{ 'checked' if request.form.get('paid') == '1' }}>
            <label class="form-check-label" for="paid">Placená akce
              {{ help_icon("Označte, pokud je akce honorována. Zobrazuje se v přehledech a výkazech.") }}
            </label>
          </div>
        </div>
        <div class="col-12">
          <label for="address" class="form-label">Adresa
            {{ help_icon("Místo konání akce — zobrazuje se v detailu akce a slouží jako orientační informace pro zdravotníky.") }}
          </label>
          <input type="text" class="form-control" id="address" name="address"
                 value="{{ request.form.get('address', '') }}">
        </div>
        <div class="col-12">
          <label for="contact_person" class="form-label">Kontaktní osoba
            {{ help_icon("Jméno a případně telefon na organizátora nebo kontaktní osobu akce (ne zdravotníka). Zobrazuje se v detailu akce.") }}
          </label>
          <input type="text" class="form-control" id="contact_person" name="contact_person"
                 value="{{ request.form.get('contact_person', '') }}">
        </div>
        <div class="col-12">
          <label for="description" class="form-label">Popis
            {{ help_icon("Volitelné doplňující informace o akci — charakter akce, požadavky na vybavení, specifické instrukce pro zdravotníky.") }}
          </label>
          <textarea class="form-control" id="description" name="description" rows="3">{{ request.form.get('description', '') }}</textarea>
        </div>
      </div>
      <div class="d-flex gap-2 mt-4">
        <button type="submit" class="btn btn-danger">Vytvořit akci</button>
        <a href="{{ url_for('events.index') }}" class="btn btn-outline-secondary">Zrušit</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
