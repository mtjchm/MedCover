services:
  web:
    build: .
    command: flask run --host=0.0.0.0 --debug
    volumes:
      - .:/app
    env_file: .env
    ports:
      - "5000:5000"
    dns:
      - 8.8.8.8
      - 1.1.1.1
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  scheduler:
    build: .
    command: python scheduler/main.py
    volumes:
      - .:/app
    env_file: .env
    dns:
      - 8.8.8.8
      - 1.1.1.1
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      # Healthy if the heartbeat file was touched within the last 30 seconds
      test: ["CMD", "python", "-c",
             "import os, time; f='/tmp/scheduler_heartbeat'; assert os.path.exists(f) and time.time()-os.path.getmtime(f)<30"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  db:
    image: postgres:17-alpine
    # Give PostgreSQL up to 60 s to finish its final checkpoint before Docker
    # sends SIGKILL on 'docker compose down/stop'.  Default is 10 s which is
    # often too short for a clean shutdown.
    stop_grace_period: 60s
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db-init:/docker-entrypoint-initdb.d:ro
      - ./postgres.conf:/etc/postgresql/postgresql.conf:ro
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    environment:
      POSTGRES_DB: medcover_dev
      POSTGRES_USER: medcover
      POSTGRES_PASSWORD: devpassword
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medcover"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

volumes:
  postgres_data:
