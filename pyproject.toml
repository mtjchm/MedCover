[tool.mypy]
python_version = "3.14"
ignore_missing_imports = true
warn_return_any = false
warn_unused_configs = true
check_untyped_defs = true
disallow_untyped_defs = true
no_implicit_optional = true
exclude = ["migrations/", "tests/", "htmlcov/", "\\.venv/"]

[[tool.mypy.overrides]]
# Flask-SQLAlchemy models inherit from db.Model which mypy can't resolve
# from the SQLAlchemy plugin without full stubs; suppress known false positives
module = ["app.models.*"]
disable_error_code = ["name-defined", "misc", "assignment"]

[[tool.mypy.overrides]]
# Flask redirect() returns werkzeug Response (not flask.wrappers.Response);
# attr-defined suppresses _get_current_object() false positive on LocalProxy
module = ["app.routes.*"]
disable_error_code = ["union-attr", "return-value", "attr-defined"]

[[tool.mypy.overrides]]
module = ["scripts.*"]
ignore_errors = true

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--cov=app --cov-report=term-missing --cov-report=html:htmlcov -v -n auto"
# Always use the dedicated test DB so tests never touch medcover_dev.
# These are safe defaults; override with real values if needed.
env = [
    "FLASK_ENV=testing",
    "SECRET_KEY=test-secret-key-not-for-production",
]

[tool.coverage.run]
source = ["app"]
omit = [
    "app/templates/*",
    "*/migrations/*",
    "*/__pycache__/*",
]

[tool.coverage.report]
show_missing = true
skip_covered = false
fail_under = 83

[tool.flake8]
max-line-length = 120
extend-ignore = ["E501", "W503", "E402"]
exclude = [
    ".git",
    "__pycache__",
    "migrations",
    ".venv",
    "htmlcov",
]

# ── Tox ──────────────────────────────────────────────────────────────────────
# Python 3.14 is the minimum supported version.
# Add new envs here as new Python releases become available (e.g. py315).
# Each env installs all dev deps from requirements-dev.txt and runs the full
# pytest suite against the shared test PostgreSQL DB (medcover_test).
# Run locally with: tox -e py314
# Run in CI:        tox (runs all configured envs)
[tool.tox]
legacy_tox_ini = """
[tox]
envlist = py314
requires = tox>=4

[testenv]
# Install exact pinned deps from the pre-compiled dev requirements file.
# This ensures reproducible environments without re-running pip-compile.
deps = -r requirements-dev.txt
# Pass through DB config — if TEST_DATABASE_URL is set (CI, local Postgres)
# testcontainers will skip the auto-container and use the provided URL instead.
passenv =
    TEST_DATABASE_URL
    DATABASE_URL
    SECRET_KEY
    DOCKER_HOST
    DOCKER_TLS_VERIFY
    DOCKER_CERT_PATH
setenv =
    FLASK_ENV = testing
    SECRET_KEY = test-secret-key-not-for-production
# Skip package installation — this is a Flask app, not an installable package.
skip_install = true
commands =
    pytest {posargs}
"""
