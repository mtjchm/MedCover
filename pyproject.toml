[tool.mypy]
python_version = "3.12"
ignore_missing_imports = true
warn_return_any = false
warn_unused_configs = true
check_untyped_defs = true
disallow_untyped_defs = true
no_implicit_optional = true
exclude = ["migrations/", "tests/", "htmlcov/", "\\.venv/"]

[[tool.mypy.overrides]]
# Flask-SQLAlchemy models inherit from db.Model which mypy can't resolve
# from the SQLAlchemy plugin without full stubs; suppress known false positives
module = ["app.models.*"]
disable_error_code = ["name-defined", "misc", "assignment"]

[[tool.mypy.overrides]]
# Flask redirect() returns werkzeug Response (not flask.wrappers.Response);
# attr-defined suppresses _get_current_object() false positive on LocalProxy
module = ["app.routes.*"]
disable_error_code = ["union-attr", "return-value", "attr-defined"]

[[tool.mypy.overrides]]
module = ["scripts.*"]
ignore_errors = true

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "--cov=app --cov-report=term-missing --cov-report=html:htmlcov -v -n auto"
# Always use the dedicated test DB so tests never touch medcover_dev.
# These are safe defaults; override with real values if needed.
env = [
    "FLASK_ENV=testing",
    "SECRET_KEY=test-secret-key-not-for-production",
    "D:TEST_DATABASE_URL=postgresql://medcover:devpassword@localhost:5432/medcover_test",
]

[tool.coverage.run]
source = ["app"]
omit = [
    "app/templates/*",
    "*/migrations/*",
    "*/__pycache__/*",
]

[tool.coverage.report]
show_missing = true
skip_covered = false

[tool.flake8]
max-line-length = 120
extend-ignore = ["E501", "W503", "E402"]
exclude = [
    ".git",
    "__pycache__",
    "migrations",
    ".venv",
    "htmlcov",
]
